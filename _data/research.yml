working_papers:
  - name: 'Can Place-Based Incentives Accelerate the Energy Transition?'
    url: 'https://www.dropbox.com/scl/fi/nrionnirrmzgqogbc9t6i/Place_Based_Incentives_03_2026.pdf?rlkey=vwz2ycb457y6jxz0jjgm8vai9&st=7pd9bvb2&dl=0'
    abstract: 'This paper examines the design and effectiveness of place-based industrial policy in renewable energy. We study the Inflation Reduction Act''s energy-community tax credits, which offered bonus subsidies to projects located in economically vulnerable, fossil-fuel reliant areas. Reduced form estimates show no significant overall changes in interconnection requests in eligible counties but substantial heterogeneity by policy eligibility, region, and technology. We then develop and estimate a structural model of project location choice to evaluate alternative policy designs. Counterfactual simulations quantify key trade-offs between developer surplus, environmental benefits, fiscal spending, and support for vulnerable communities in the design of place-based policies.'
    coauthors:
      - name: 'Gaurav Doshi'
        url: 'https://www.gauravecon.com/'
      - name: 'Xiaochen Sun'
        url: 'https://xiaochensun.netlify.app/'
  - name: 'Powering Down and Moving On? Energy Transition, Gentrification, and Local Impacts'
    url: 'energytransition_migration_JL.pdf'
    abstract: 'This study investigates the effects of fossil fuel power plant closures on local migration. I leverage variation in fuel prices and plant age that results in plausibly exogenous power plant retirements. The retirement results in a "stagnation effect" where both in-migration and out-migration decreases, a pattern not consistent with a typical gentrification result of increased in and out migration. My analysis shows that the stagnation effect is more pronounced in lower-income and predominantly Black communities, raising environmental justice concerns. These findings underscore the complex interplay between the environmental advantages and local economic challenges associated with phasing out fossil fuel infrastructure.'
  - name: 'Energy Transition and Mental Health'
    url: 'energytransition_mentalhealth_2024.pdf'
    abstract: 'We provide quasi-experimental estimates of the impact of coal and natural gas power plant retirements on the mental health of local residents in the United States. Combining data on power plant retirements and restricted mental health data, we employ a difference-in-differences approach and find that coal-fired power plant retirements have a significant negative impact on mental health, while natural gas retirements have a positive effect. These findings offer valuable insights for ensuring an equitable and smooth energy transition. By understanding the mechanisms behind these effects — including economic impacts and local amenity improvements — we highlight opportunities for targeted policy interventions.'
    coauthors:
      - name: 'Dylan Brewer'
        url: 'https://www.dylanbrewer.com/'
      - name: 'Kaiyi Wen'
        url: 'https://www.kaiyiwen.com/'
      - name: 'Yueming (Lucy) Qiu'
        url: 'https://sites.google.com/site/yueminglucyqiu'
  - name: 'The Market Value of Reproductive Rights: Evidence from U.S. Housing Markets'
    url: 'https://www.nber.org/papers/w34921'
    pdf: 'w34921.pdf'
    related_info: 'NBER Working Paper #34921'
    abstract: 'We estimate the market value of reproductive rights as capitalized into U.S. housing markets. We do so using a synthetic difference-in-differences design to evaluate the effects of total abortion bans following the 2022 Dobbs decision, and drawing on housing market indices from Zillow and vacancy rate data from the U.S. Census Bureau''s Housing Vacancy Survey. The results indicate that total abortion bans reduced rents by an average of 2.2% from July 2022 through June 2025, with the effect reaching 4.0% in the most recent year. Over the same horizon, bans increased rental vacancy rates by an average of 1.1 percentage points, with the effect reaching 1.8 percentage points in the most recent year. Estimates for home values and homeowner vacancy rates are similar in magnitude but less precise.'
    coauthors:
      - name: 'Daniel Dench'
        url: 'https://www.danieldench.com/'
      - name: 'Kelly Lifchez'
        url: 'https://sites.google.com/view/kellylifchez'
      - name: 'Jason Lindo'
        url: 'https://sites.gatech.edu/jasonlindo/'
  - name: 'Are People Fleeing States with Abortion Bans?'
    url: 'https://www.nber.org/papers/w33328'
    pdf: 'w33328.pdf'
    related_info: 'NBER Working Paper #33328'
    abstract: 'We investigate whether reproductive rights affect migration. We use a synthetic difference-in-differences design that leverages variation from the 2022 Dobbs decision, which allowed states to ban abortion, and population flows based on change-of-address data from the United States Postal Service. The results indicate that bans increase net migration outflows, with effect sizes growing throughout the year after the decision. The effects are more prominent for single-person households than family households, which may reflect larger effects on younger adults. We also find suggestive evidence of impacts for states hostile towards abortion in ways other than having total bans.'
    coauthors:
      - name: 'Daniel Dench'
        url: 'https://www.danieldench.com/'
      - name: 'Kelly Lifchez'
        url: 'https://sites.google.com/view/kellylifchez'
      - name: 'Jason Lindo'
        url: 'https://sites.gatech.edu/jasonlindo/'
  - name: 'Beyond Labels: How Social Norms Shape Eco-label Consumption'
    abstract: 'This study investigates the impact of social norms information on consumer behavior regarding eco-labeled products. I focus on three types of norms: injunctive norms, descriptive norms, and working-together normative appeals. Through a choice experiment, I explore how different norms interact with multiple eco-labels. Notably, descriptive norms begin to influence consumer choices when 50% or more of consumers are reported to purchase the product. Consumers exhibit a willingness to pay a premium for eco-labels, and this willingness increases with the number of labels presented. Under treatments involving injunctive norms and working-together appeals, both descriptive norms information and certified eco-labels contribute to higher willingness-to-pay values. These findings provide insights for promoting green consumption and environmental improvement through strategic norms communication.'
    coauthors:
      - name: 'Tibor Besedes'
        url: 'https://besedes.econ.gatech.edu/'

